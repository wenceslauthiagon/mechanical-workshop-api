version: '3.9'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: phase4-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-os:
    image: postgres:16-alpine
    container_name: phase4-postgres-os
    environment:
      POSTGRES_USER: os
      POSTGRES_PASSWORD: os
      POSTGRES_DB: os_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_os_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U os -d os_db']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-billing:
    image: postgres:16-alpine
    container_name: phase4-postgres-billing
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
      POSTGRES_DB: billing_db
    ports:
      - '5434:5432'
    volumes:
      - postgres_billing_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U billing -d billing_db']
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-execution:
    image: mongo:7
    container_name: phase4-mongo-execution
    environment:
      MONGO_INITDB_ROOT_USERNAME: execution
      MONGO_INITDB_ROOT_PASSWORD: execution
      MONGO_INITDB_DATABASE: execution_db
    ports:
      - '27017:27017'
    volumes:
      - mongo_execution_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5

  os-service:
    build:
      context: ./os-service
    container_name: phase4-os-service
    environment:
      DATABASE_URL: postgresql://os:os@postgres-os:5432/os_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 3001
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-os:
        condition: service_healthy

  billing-service:
    build:
      context: ./billing-service
    container_name: phase4-billing-service
    environment:
      DATABASE_URL: postgresql://billing:${BILLING_DB_PASSWORD}@postgres-billing:5432/billing_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 3002
      NODE_ENV: development
    ports:
      - '3002:3002'
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-billing:
        condition: service_healthy

  execution-service:
    build:
      context: ./execution-service
    container_name: phase4-execution-service
    environment:
      MONGODB_URI: mongodb://execution:${EXECUTION_DB_PASSWORD}@mongo-execution:27017/execution_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 3003
      NODE_ENV: development
    ports:
      - '3003:3003'
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-execution:
        condition: service_healthy

volumes:
  postgres_os_data:
  postgres_billing_data:
  mongo_execution_data:
