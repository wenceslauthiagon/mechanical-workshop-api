apiVersion: apps/v1
kind: Deployment
metadata:
  name: os-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: os-service
  template:
    metadata:
      labels:
        app: os-service
    spec:
      automountServiceAccountToken: false
      containers:
        - name: os-service
          image: ghcr.io/your-org/os-service:v1.0.0
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"
            limits:
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: os-service
spec:
  selector:
    app: os-service
  ports:
    - port: 80
      targetPort: 3001
