apiVersion: apps/v1
kind: Deployment
metadata:
  name: os-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: os-service
  template:
    metadata:
      labels:
        app: os-service
    spec:
      containers:
        - name: os-service
          image: ghcr.io/your-org/os-service:latest
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: os-service
spec:
  selector:
    app: os-service
  ports:
    - port: 80
      targetPort: 3001
