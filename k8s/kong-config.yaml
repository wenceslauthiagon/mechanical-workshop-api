apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: mechanical-workshop
data:
  kong.yml: |
    _format_version: "3.0"

    consumers:
      - username: cpf-auth-function
        custom_id: cpf-auth-function
        jwt_secrets:
          - key: mechanical-workshop-auth
            algorithm: HS256
            secret: your-super-secret-jwt-key-change-in-production

    services:
      - name: workshop-api
        url: http://workshop-api-service:3000
        routes:
          - name: health-route
            paths:
              - /health
            methods:
              - GET
            strip_path: false
          - name: protected-api-route
            paths:
              - /api
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            strip_path: false
            plugins:
              - name: jwt
                config:
                  claims_to_verify:
                    - exp
                  key_claim_name: iss
