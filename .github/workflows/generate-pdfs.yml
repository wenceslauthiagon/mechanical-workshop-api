name: Generate Delivery PDFs

on:
  workflow_dispatch: {}

jobs:
  build:
    name: Build PDFs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Generate DELIVERY_DOCUMENT.pdf
        run: |
          pandoc docs/DELIVERY_DOCUMENT.md docs/VULNERABILITY_REPORT_SUMMARY.md -o docs/DELIVERY_DOCUMENT.pdf --pdf-engine=xelatex || true

      - name: Generate VULNERABILITY_REPORT_SUMMARY.pdf
        run: |
          pandoc docs/VULNERABILITY_REPORT_SUMMARY.md -o docs/VULNERABILITY_REPORT_SUMMARY.pdf --pdf-engine=xelatex || true

      - name: Upload generated PDFs
        uses: actions/upload-artifact@v4
        with:
          name: delivery-pdfs
          path: |
            docs/DELIVERY_DOCUMENT.pdf
            docs/VULNERABILITY_REPORT_SUMMARY.pdf
