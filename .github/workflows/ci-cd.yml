name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Generate Prisma Client
        env:
          PRISMA_GENERATE_SKIP_AUTOINSTALL: false
          DATABASE_URL: file:./test.db
        run: npx prisma generate --generator client

      - name: Run migrations
        env:
          DATABASE_URL: file:./test.db
        run: npx prisma db push --skip-generate

      - name: Run tests
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: npm run test:cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/'))
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: set-tag
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          BRANCH_NAME=${BRANCH_NAME//\//-}
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          
          if [ "$BRANCH_NAME" = "main" ]; then
            TAG="latest"
          else
            TAG="${BRANCH_NAME}-${SHA_SHORT}"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building with tag: $TAG"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-aks-staging:
    name: Deploy to AKS Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: false
    environment:
      name: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: mechanical-workshop-rg-staging
          cluster-name: mechanical-workshop-aks-staging

      - name: Create namespace
        run: |
          kubectl create namespace mechanical-workshop --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Image Pull Secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=mechanical-workshop \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy ConfigMap and Secrets
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

      - name: Deploy Application
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG"
          
          sed -i "s|image: .*|image: $IMAGE_NAME|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/workshop-api -n mechanical-workshop --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n mechanical-workshop
          kubectl get svc -n mechanical-workshop
          kubectl get hpa -n mechanical-workshop

  deploy-to-aks-production:
    name: Deploy to AKS Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: false
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: mechanical-workshop-rg
          cluster-name: mechanical-workshop-aks

      - name: Create namespace
        run: |
          kubectl create namespace mechanical-workshop --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Image Pull Secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=mechanical-workshop \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy ConfigMap and Secrets
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

      - name: Deploy Application
        run: |
          IMAGE_TAG="latest"
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG"
          
          sed -i "s|image: .*|image: $IMAGE_NAME|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/workshop-api -n mechanical-workshop --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n mechanical-workshop
          kubectl get svc -n mechanical-workshop
          kubectl get hpa -n mechanical-workshop

  deploy-with-terraform:
    name: Deploy with Terraform
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: false
    
    defaults:
      run:
        working-directory: ./infra
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: workshop-terraform
          wait: 30s

      - name: Configure kubectl for Kind
        run: |
          kubectl config use-context kind-workshop-terraform
          kubectl cluster-info
          kubectl get nodes
        env:
          KUBECONFIG: /home/runner/.kube/config

      - name: Terraform Init
        run: terraform init
        env:
          KUBECONFIG: /home/runner/.kube/config

      - name: Terraform Validate
        run: terraform validate
        env:
          KUBECONFIG: /home/runner/.kube/config

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan \
            -var="kubeconfig_path=/home/runner/.kube/config" \
            -var="kube_context=kind-workshop-terraform" \
            -var="app_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            -var="database_password=workshop123" \
            -var="jwt_secret=default-jwt-secret-key"
        env:
          KUBECONFIG: /home/runner/.kube/config

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        env:
          KUBECONFIG: /home/runner/.kube/config
      
      - name: Verify Terraform Deployment
        run: |
          echo "=== Terraform Deployment Verification ==="
          kubectl get all -n mechanical-workshop
          echo "=== Terraform deployment complete ==="
        env:
          KUBECONFIG: /home/runner/.kube/config


  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-to-aks-staging, deploy-to-aks-production]
    if: always()
    
    steps:
      - name: Notify Success
        if: needs.deploy-to-aks-staging.result == 'success' || needs.deploy-to-aks-production.result == 'success'
        run: echo "Deployment successful!"

      - name: Notify Failure
        if: needs.deploy-to-aks-staging.result == 'failure' || needs.deploy-to-aks-production.result == 'failure'
        run: |
          echo "Deployment failed (cloud deploy is disabled in this workflow)."

