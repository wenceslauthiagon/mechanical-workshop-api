name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workshop
          POSTGRES_PASSWORD: workshop123
          POSTGRES_DB: workshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://workshop:workshop123@localhost:5432/workshop_test
        run: npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: postgresql://workshop:workshop123@localhost:5432/workshop_test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: npm run test:cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    env:
      KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy ConfigMap
        run: kubectl apply -f k8s/configmap.yaml

      - name: Deploy Secrets
        run: kubectl apply -f k8s/secret.yaml

      - name: Deploy PostgreSQL
        run: kubectl apply -f k8s/postgres-deployment.yaml

      - name: Deploy Redis
        run: kubectl apply -f k8s/redis-deployment.yaml

      - name: Update API image
        run: |
          kubectl set image deployment/workshop-api \
            workshop-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -n mechanical-workshop

      - name: Deploy API
        run: kubectl apply -f k8s/app-deployment.yaml

      - name: Deploy HPA
        run: kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/workshop-api \
            -n mechanical-workshop \
            --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n mechanical-workshop
          kubectl get svc -n mechanical-workshop
          kubectl get hpa -n mechanical-workshop

  deploy-with-terraform:
    name: Deploy with Terraform
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[terraform]')
    
    env:
      KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
      TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
    
    defaults:
      run:
        working-directory: ./infra
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-to-kubernetes]
    if: always()
    
    steps:
      - name: Notify Success
        if: needs.deploy-to-kubernetes.result == 'success'
        run: echo "✅ Deployment successful!"

      - name: Notify Failure
        if: needs.deploy-to-kubernetes.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          exit 1
