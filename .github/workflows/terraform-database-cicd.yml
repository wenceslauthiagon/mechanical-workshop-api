name: CI/CD - Terraform Database

on:
  push:
    branches: [main, develop]
    paths:
      - 'terraform-database/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'terraform-database/**'
  workflow_dispatch:

env:
  TF_VERSION: 1.6.0
  CLOUD_DEPLOY_ENABLED: 'false'

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform-database
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
      
      - name: Terraform Init
        run: terraform init -backend=false
      
      - name: Terraform Validate
        run: terraform validate
      
      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
      
      - name: Run TFLint
        run: tflint --init && tflint

  terraform-plan-staging:
    name: Terraform Plan (Staging)
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: false
    defaults:
      run:
        working-directory: terraform-database
    environment:
      name: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure Login (Staging)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.CLOUD_CREDENTIALS_STAGING }}
      
      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_environment: staging
      
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_environment: staging
          TF_VAR_db_name: ${{ secrets.DB_NAME_STAGING }}
          TF_VAR_db_user: ${{ secrets.DB_USER }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_STAGING }}
          TF_VAR_region: ${{ secrets.CLOUD_REGION }}
      
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-db-staging
          path: terraform-database/tfplan

  terraform-apply-staging:
    name: Terraform Apply (Staging)
    runs-on: ubuntu-latest
    needs: terraform-plan-staging
    if: false
    defaults:
      run:
        working-directory: terraform-database
    environment:
      name: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure Login (Staging)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.CLOUD_CREDENTIALS_STAGING }}
      
      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_environment: staging
      
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-db-staging
          path: terraform-database
      
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
      
      - name: Terraform Output
        run: terraform output -json > outputs.json
      
      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-db-outputs-staging
          path: terraform-database/outputs.json

  terraform-plan-production:
    name: Terraform Plan (Production)
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: false
    defaults:
      run:
        working-directory: terraform-database
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure Login (Production)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.CLOUD_CREDENTIALS_PRODUCTION }}
      
      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_environment: production
      
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_environment: production
          TF_VAR_db_name: ${{ secrets.DB_NAME_PRODUCTION }}
          TF_VAR_db_user: ${{ secrets.DB_USER }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PRODUCTION }}
          TF_VAR_region: ${{ secrets.CLOUD_REGION }}
      
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-db-production
          path: terraform-database/tfplan

  terraform-apply-production:
    name: Terraform Apply (Production)
    runs-on: ubuntu-latest
    needs: terraform-plan-production
    if: false
    defaults:
      run:
        working-directory: terraform-database
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure Login (Production)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.CLOUD_CREDENTIALS_PRODUCTION }}
      
      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_environment: production
      
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-db-production
          path: terraform-database
      
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
      
      - name: Terraform Output
        run: terraform output -json > outputs.json
      
      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-db-outputs-production
          path: terraform-database/outputs.json
      
      - name: Run Database Migrations
        run: |
          DB_HOST=$(terraform output -raw db_host)
          DB_NAME=$(terraform output -raw db_name)
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
