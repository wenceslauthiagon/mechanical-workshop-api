name: Phase4 Billing Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'phase4/billing-service/**'
      - '.github/workflows/phase4-billing-service-cicd.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'phase4/billing-service/**'
      - '.github/workflows/phase4-billing-service-cicd.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_NAME: billing-service
  SERVICE_PATH: phase4/billing-service
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/billing-service
  K8S_NAMESPACE: workshop

jobs:
  build-test-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_PATH }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phase4/billing-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:cov

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: phase4/billing-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push-image:
    if: github.event_name == 'push'
    needs: build-test-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./phase4/billing-service
          file: ./phase4/billing-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/billing-service:latest
            ghcr.io/${{ github.repository_owner }}/billing-service:${{ github.sha }}

  deploy:
    if: github.event_name == 'push'
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl get namespace $K8S_NAMESPACE || kubectl create namespace $K8S_NAMESPACE
          kubectl -n $K8S_NAMESPACE apply -f $SERVICE_PATH/k8s/deployment.yaml
          kubectl -n $K8S_NAMESPACE set image deployment/$SERVICE_NAME $SERVICE_NAME=$IMAGE_NAME:${{ github.sha }}
          kubectl -n $K8S_NAMESPACE rollout status deployment/$SERVICE_NAME
